# RelyLoop public site — https://relyloop.com
# Preview locally: pip install -r requirements.txt && mkdocs serve
# (run from this directory). CI builds with `mkdocs build --strict`.

site_name: RelyLoop
site_url: https://relyloop.com
site_description: >-
  Autonomous relevance optimization for enterprise search — Bayesian
  search-space tuning across Elasticsearch, OpenSearch, and Apache Solr,
  shipped as Pull Requests.
site_author: soundminds.ai
copyright: Copyright &copy; 2026 soundminds.ai — Apache License 2.0

repo_url: https://github.com/SoundMindsAI/relyloop
repo_name: SoundMindsAI/relyloop
edit_uri: edit/main/website/docs/

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - search.suggest
    - search.highlight
    - announce.dismiss

plugins:
  - search
  - tags
  - blog:
      blog_dir: blog
      post_url_format: "{slug}"
  # glightbox: pinch/click-zoom lightbox for screenshots on the Guides pages.
  # skip_classes lets index-card thumbnails opt OUT of the lightbox so a click
  # navigates to the deck page instead of opening an overlay (feat_website_walkthrough_guides).
  - glightbox:
      skip_classes: ["glightbox-skip"]

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Auto-append the glossary to every page so `abbr` turns defined terms
      # into hover tooltips site-wide. The file lives outside docs/ so it is
      # never treated as a standalone page (no --strict nav warning).
      auto_append:
        - includes/abbreviations.md
      base_path:
        - .
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  # Footer build stamp — populated by deploy-docs.yml at build time so the
  # deployed site records the exact commit + PR that produced it. Local
  # `mkdocs serve` falls back to "dev" (no stamp rendered). Distinct from the
  # Material repo-info widget in the header, which shows the latest GitHub
  # *release*, not this deploy.
  build:
    sha: !ENV [BUILD_SHA, "dev"]
    pr: !ENV [BUILD_PR, ""]
    time: !ENV [BUILD_TIME, ""]
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SoundMindsAI/relyloop
      name: RelyLoop on GitHub
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

