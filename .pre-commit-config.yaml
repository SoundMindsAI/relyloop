# Pre-commit hooks for RelyLoop (infra_foundation Story 1.4 / FR-6).
#
# Install:
#   uv run pre-commit install --hook-type commit-msg --hook-type pre-commit
#
# Run all hooks against the entire repo:
#   make pre-commit   (or:  uv run pre-commit run --all-files)
#
# Hook tools live in their own isolated environments managed by pre-commit;
# they don't touch the project's .venv or ui/node_modules.

minimum_pre_commit_version: "4.0.0"
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ---------------------------------------------------------------------------
  # Python — ruff (format + check)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        files: \.py$
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: \.py$

  # ---------------------------------------------------------------------------
  # Python — mypy (--strict; uses its own pinned env with project types)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/app/
        args: [--strict, --config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.6
          - sqlalchemy[asyncio]>=2.0.36
          - fastapi>=0.115
          - structlog>=24.4
          - httpx>=0.28

  # ---------------------------------------------------------------------------
  # Frontend — prettier + eslint (run via the project's pnpm to use pinned versions)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier-ui
        name: prettier (ui/)
        # Run prettier from the ui/ dir against its src/ tree. We use
        # pass_filenames: false because pre-commit passes paths relative
        # to the repo root (ui/src/...), but `pnpm --dir ui` flips cwd to
        # ui/ where those paths don't exist. For a small UI tree, full-src
        # check is fast enough.
        entry: pnpm --dir ui exec prettier --check src
        language: system
        files: ^ui/src/.*\.(ts|tsx|css|md|json)$
        pass_filenames: false

      - id: eslint-ui
        name: eslint (ui/, via next lint)
        entry: pnpm --dir ui lint
        language: system
        files: ^ui/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Secret scanning — gitleaks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$  # markdown allows trailing whitespace for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.ya?ml$  # docker-compose YAML uses non-standard tags
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---------------------------------------------------------------------------
  # Conventional Commits (commit-msg stage) — per infra_foundation FR-6
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commits format check
        entry: bash scripts/check-conventional-commit.sh
        language: system
        stages: [commit-msg]
