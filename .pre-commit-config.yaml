# Pre-commit hooks for RelyLoop (infra_foundation Story 1.4 / FR-6).
#
# Install:
#   uv run pre-commit install --hook-type commit-msg --hook-type pre-commit
#
# Run all hooks against the entire repo:
#   make pre-commit   (or:  uv run pre-commit run --all-files)
#
# Hook tools live in their own isolated environments managed by pre-commit;
# they don't touch the project's .venv or ui/node_modules.

minimum_pre_commit_version: "4.0.0"
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ---------------------------------------------------------------------------
  # Python — ruff (format + check)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin matches the project's `pyproject.toml` `[dependency-groups].dev`
    # ruff version. Drift between the two surfaces as format ping-pong (the
    # hook reformats one way, `make fmt` reformats back). Bump in lockstep.
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: \.py$
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: \.py$

  # ---------------------------------------------------------------------------
  # Python — mypy via the project venv (uv run), so type stubs match exactly
  # what `make typecheck` sees. The mirrors-mypy hook with its own isolated
  # env caused chronic drift between hook stubs and project package versions
  # (uuid-utils, types-redis, Redis generics, etc.). System mypy is the
  # single source of truth.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv via uv run)
        entry: uv run mypy --strict --config-file=pyproject.toml backend/
        language: system
        files: ^backend/
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Frontend — prettier + eslint (run via the project's pnpm to use pinned versions)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier-ui
        name: prettier (ui/ entire tree)
        # Run prettier from the ui/ dir against ALL relevant files (not just
        # src/) so package.json, tsconfig.json, eslint.config.mjs, and the
        # .prettierrc.json land formatted too. pass_filenames: false because
        # pre-commit passes ui/-prefixed paths from the repo root but
        # `pnpm --dir ui` flips cwd to ui/.
        # 2026-05-12: `eslint.config.mjs` replaces the deleted legacy
        # `.eslintrc.json` (ESLint 9 flat config); checked here so the
        # config file itself stays prettier-formatted.
        # `scripts/run-pnpm.sh` sources nvm (when present) so the hook
        # subshell picks up the .nvmrc-pinned Node 22, not whatever stale
        # `nvm use` the parent shell happens to have active. Without it,
        # devs whose nvm default is <20.18 hit ERR_PNPM_UNSUPPORTED_ENGINE
        # on every UI-touching commit (chore_precommit_node_path_resolution).
        # Falls back to bare `pnpm` on CI (no nvm — Node provisioned by
        # actions/setup-node@v4).
        entry: scripts/run-pnpm.sh --dir ui exec prettier --check
          src
          package.json
          tsconfig.json
          eslint.config.mjs
          .prettierrc.json
        language: system
        files: ^ui/.*\.(ts|tsx|js|jsx|mjs|css|md|json)$
        exclude: ^(ui/node_modules/|ui/\.next/|ui/pnpm-lock\.yaml)
        pass_filenames: false

      - id: eslint-ui
        name: eslint (ui/, flat config)
        # 2026-05-12: Next 16 removed `next lint`; the `pnpm lint` script now
        # runs `eslint .` directly against the flat config in eslint.config.mjs.
        # See prettier-ui above for the run-pnpm.sh rationale.
        entry: scripts/run-pnpm.sh --dir ui lint
        language: system
        files: ^ui/src/.*\.(ts|tsx|js|jsx|mjs)$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # MVP1 dashboard — regenerate when feature folders change so the committed
  # dashboard always matches the folder state. Mirrors the impl-execute Step 8
  # finalization workflow but runs on every commit instead of only at merge time.
  #
  # Standard pre-commit pattern: if the script modifies mvp1_dashboard.html,
  # the hook reports "files were modified" and aborts the commit, forcing the
  # contributor to `git add docs/00_overview/mvp1_dashboard.html && git commit`.
  # Same UX as ruff-format / prettier when those reformat staged files.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mvp1-dashboard-regen
        name: Regenerate MVP1 dashboard if feature folders changed
        entry: python3 scripts/build_mvp1_dashboard.py
        language: system
        files: ^(docs/00_overview/planned_features/|docs/00_overview/implemented_features/|scripts/build_mvp1_dashboard\.py$)
        pass_filenames: false

      # Per chore_state_md_size_compression: keep state.md a one-page snapshot
      # loadable in a single Read call. Fails the commit if it exceeds 60 KB —
      # the fix is to move history into state_history.md, never to raise the cap.
      - id: state-md-size-guard
        name: state.md stays a one-page snapshot (<60 KB)
        entry: bash scripts/check-state-md-size.sh
        language: system
        files: ^state\.md$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # SPDX / license headers — REUSE (https://reuse.software/). Run via the
  # project venv (uv run) so the linter version matches the `reuse` pin in
  # pyproject.toml `[dependency-groups].dev` exactly — same single-source-of-
  # truth rationale as the mypy hook above. Fails the commit if any tracked
  # file lacks an SPDX header and isn't covered by REUSE.toml. `reuse annotate`
  # adds headers; see REUSE.toml for the coverage map of header-exempt files.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: reuse-lint
        name: reuse lint (SPDX headers, project venv via uv run)
        entry: uv run reuse lint
        language: system
        pass_filenames: false
        always_run: true

  # ---------------------------------------------------------------------------
  # Secret scanning — gitleaks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$  # markdown allows trailing whitespace for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.ya?ml$  # docker-compose YAML uses non-standard tags
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---------------------------------------------------------------------------
  # Conventional Commits (commit-msg stage) — per infra_foundation FR-6
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commits format check
        entry: bash scripts/check-conventional-commit.sh
        language: system
        stages: [commit-msg]

  # ---------------------------------------------------------------------------
  # DCO sign-off (commit-msg stage) — see CONTRIBUTING.md "Developer Certificate
  # of Origin (DCO)". CI gate at .github/workflows/dco.yml enforces the same on
  # every PR; this hook catches the miss locally.
  # ---------------------------------------------------------------------------
      - id: dco-signoff
        name: DCO Signed-off-by trailer check
        entry: bash scripts/check-dco-signoff.sh
        language: system
        stages: [commit-msg]
