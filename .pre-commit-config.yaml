# Pre-commit hooks for RelyLoop (infra_foundation Story 1.4 / FR-6).
#
# Install:
#   uv run pre-commit install --hook-type commit-msg --hook-type pre-commit
#
# Run all hooks against the entire repo:
#   make pre-commit   (or:  uv run pre-commit run --all-files)
#
# Hook tools live in their own isolated environments managed by pre-commit;
# they don't touch the project's .venv or ui/node_modules.

minimum_pre_commit_version: "4.0.0"
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ---------------------------------------------------------------------------
  # Python — ruff (format + check)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        files: \.py$
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: \.py$

  # ---------------------------------------------------------------------------
  # Python — mypy via the project venv (uv run), so type stubs match exactly
  # what `make typecheck` sees. The mirrors-mypy hook with its own isolated
  # env caused chronic drift between hook stubs and project package versions
  # (uuid-utils, types-redis, Redis generics, etc.). System mypy is the
  # single source of truth.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv via uv run)
        entry: uv run mypy --strict --config-file=pyproject.toml backend/
        language: system
        files: ^backend/
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Frontend — prettier + eslint (run via the project's pnpm to use pinned versions)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier-ui
        name: prettier (ui/ entire tree)
        # Run prettier from the ui/ dir against ALL relevant files (not just
        # src/) so package.json, tsconfig.json, .prettierrc.json, and any
        # root-level docs land formatted too. pass_filenames: false because
        # pre-commit passes ui/-prefixed paths from the repo root but
        # `pnpm --dir ui` flips cwd to ui/.
        entry: pnpm --dir ui exec prettier --check
          src
          package.json
          tsconfig.json
          .eslintrc.json
          .prettierrc.json
        language: system
        files: ^ui/.*\.(ts|tsx|js|jsx|css|md|json)$
        exclude: ^(ui/node_modules/|ui/\.next/|ui/pnpm-lock\.yaml)
        pass_filenames: false

      - id: eslint-ui
        name: eslint (ui/, via next lint)
        entry: pnpm --dir ui lint
        language: system
        files: ^ui/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Secret scanning — gitleaks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$  # markdown allows trailing whitespace for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.ya?ml$  # docker-compose YAML uses non-standard tags
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---------------------------------------------------------------------------
  # Conventional Commits (commit-msg stage) — per infra_foundation FR-6
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commits format check
        entry: bash scripts/check-conventional-commit.sh
        language: system
        stages: [commit-msg]
