<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="RelyLoop">
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>
  <!-- Loop ring: open at the top to suggest an in-flight optimization loop
       (Karpathy loop motif — RelyLoop's core product metaphor). -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#ffffff" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="93 20" transform="rotate(-90 32 32)"/>
  <!-- Dot at the loop's "entry point" — the trial-by-trial scoring marker. -->
  <circle cx="32" cy="14" r="4" fill="#ffffff"/>
</svg>
