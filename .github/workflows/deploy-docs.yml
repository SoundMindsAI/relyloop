name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-docs.yml"
  # Daily rebuild keeps the relyloop.com footer's "build SHA / merged PR /
  # built X ago" stamp current. Without this, infra / chore / docs PRs that
  # don't touch website/** leave the stamp pinned at the last website-
  # touching merge — so a reader visiting the site after a week of active
  # work sees an apparent week-old build and thinks the project is stale.
  # The rebuild is a no-op when nothing in website/ has changed (same
  # generated site bytes; only the stamp's SHA / PR / timestamp refresh).
  # 03:17 UTC is offset from the existing project crons (codeql 04:31 Mon,
  # scorecard 04:27 Mon, reconcile-tracking-issues 05:17 daily) — both for
  # the "minute 17" convention and to avoid hitting GHA peak-load windows.
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

# Least privilege for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history for any git-revision-date plugin

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: website/requirements.lock

      - name: Install dependencies
        # Hash-pinned lock (OSSF Scorecard Pinned-Dependencies). Regenerate via
        # `uv pip compile website/requirements.txt --generate-hashes -o website/requirements.lock`.
        run: pip install --require-hashes -r website/requirements.lock

      - name: Compute build stamp
        # Short commit SHA + merged PR number (parsed from the squash-merge
        # commit subject, e.g. "… (#370)"). Consumed by mkdocs.yml's
        # extra.build.* via !ENV and rendered in the footer copyright partial.
        run: |
          echo "BUILD_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_PR=$(git log -1 --pretty=%s | grep -oE '#[0-9]+' | head -1 | tr -d '#')" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build site (strict)
        run: mkdocs build --strict
        working-directory: website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
