name: secrets-defense

# Defense-in-depth checks that must run on EVERY PR, regardless of which
# files changed. Lives in its own workflow file so the `paths-ignore` filter
# in pr.yml doesn't accidentally skip security checks on `.gitignore`-only
# or `docs/**`-only PRs.
#
# Bundles the env-file filename guard (formerly a job in pr.yml) with a
# content-based gitleaks scan, so a single workflow file covers both
# filename-pattern (`.env.old` etc.) and content-pattern (`OPENAI_API_KEY=sk-...`
# in any file) secret leakage. Pinned to the same gitleaks version as
# `.pre-commit-config.yaml` to keep local + CI signal consistent.
#
# Both jobs are ≤30s, run in parallel, and never live on the critical path —
# they're additive defense. See:
#   - docs/00_overview/implemented_features/2026_05_13_bug_env_file_corrupted_during_session/bug_fix.md
#   - docs/00_overview/planned_features/chore_ci_gitignore_paths_ignore_gap/idea.md
#   - docs/00_overview/planned_features/chore_ci_gitleaks_workflow_step/idea.md

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-files-guard:
    # bug_env_file_corrupted_during_session — defense-in-depth.
    # Fails the PR if a `.env`-family file other than `.env.example` is
    # added or modified. Catches the failure mode where .gitignore is
    # regressed or `git add -f` is used.
    name: secrets files guard (no .env* except .env.example)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need enough history for `git diff origin/<base>...HEAD` and
          # `git diff HEAD~1 HEAD` to resolve.
          fetch-depth: 50

      - name: Self-test guard against canned inputs
        run: bash scripts/ci/test_check_no_env_files.sh

      - name: Verify no forbidden .env* files in diff
        run: bash scripts/ci/check-no-env-files.sh

  gitleaks:
    # chore_ci_gitleaks_workflow_step — content-pattern defense.
    # Complements secrets-files-guard (which checks filenames) by scanning
    # file contents for known secret patterns (OpenAI keys, GitHub PATs,
    # Postgres URLs with credentials, etc.). Pinned to the same gitleaks
    # version as .pre-commit-config.yaml so local pre-commit + CI agree.
    #
    # Uses the official binary release directly (not gitleaks-action@v2),
    # because gitleaks-action requires a paid GITLEAKS_LICENSE for
    # private/org repos. The binary approach has no license requirement
    # and gives us pin-precise version control.
    name: gitleaks (content scan)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      GITLEAKS_VERSION: 8.21.2
      # SHA256 of gitleaks_8.21.2_linux_x64.tar.gz from the upstream
      # release checksums.txt. A version tag alone does not pin bytes —
      # GitHub release assets are mutable, so a compromised maintainer
      # account could swap the binary under an existing tag. Verify the
      # digest before extracting/executing. Bump alongside GITLEAKS_VERSION.
      GITLEAKS_SHA256: 5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Scan the full PR diff against origin/<base>; need history to resolve.
          fetch-depth: 50

      - name: Install gitleaks
        run: |
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/ gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan PR diff for secrets
        run: |
          # `gitleaks detect` scans the full working tree; `gitleaks protect
          # --staged` scans staged-only. For PRs we want the commits-since-base
          # range, which `gitleaks detect --log-opts` covers.
          BASE="${GITHUB_BASE_REF:-main}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch --no-tags --depth=50 origin \
              "+refs/heads/${BASE}:refs/remotes/origin/${BASE}" >/dev/null 2>&1 || true
            LOG_OPTS="origin/${BASE}..HEAD"
          else
            LOG_OPTS="HEAD~1..HEAD"
          fi
          gitleaks detect \
            --source=. \
            --log-opts="${LOG_OPTS}" \
            --redact \
            --verbose \
            --no-banner \
            --exit-code=1

  internal-domains:
    # chore_state_domain_scrub_gate — narrative-file domain hygiene.
    # state.md / state_history.md are free-form and public; this job fails
    # the PR if a non-allowlisted domain name or private-host IP appears in
    # them, so an operator's internal hostnames can never land in plain text.
    # Mirrors the pre-commit hook `internal-domains-guard` for local+CI parity.
    name: internal domains guard (state.md / state_history.md)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Scan narrative files for plain-text domains / private IPs
        run: python3 scripts/check_internal_domains.py
