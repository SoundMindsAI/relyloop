# Alembic configuration for RelyLoop (infra_foundation Story 2.2).
#
# - script_location is at repo-root migrations/ per tech-stack.md "Code organization"
# - sqlalchemy.url is intentionally left BLANK; migrations/env.py reads
#   Settings.database_url at runtime (which reads DATABASE_URL_FILE)
# - file_template uses sequential numeric revision IDs (0001_, 0002_, ...)
#   pinned via `--rev-id <NNNN>`; no date prefix

[alembic]
script_location = migrations
prepend_sys_path = .
file_template = %%(rev)s_%%(slug)s
output_encoding = utf-8
sqlalchemy.url =

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
